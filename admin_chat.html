<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synergy — Admin Support Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    min-height: 100vh;
    display: flex;
    overflow: hidden;
    color: #333;
  }

  /* ===== NAVIGATION SIDEBAR (Fixed Left on Desktop) ===== */
  .nav-sidebar {
    width: 280px;
    min-width: 280px;
    background: #0a0a0f;
    border-right: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    position: fixed;
    height: 100vh;
    z-index: 100;
    left: 0;
    top: 0;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  .sidebar-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 99;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s, visibility 0.3s;
  }
  .sidebar-backdrop.visible { opacity: 1; visibility: visible; }

  .nav-sidebar .sidebar-header {
    padding: 0 20px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: #ffffff;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; color: #0a0a0f; }

  .logo-text {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
    color: #ffffff;
  }

  .nav-section {
    padding: 0 12px;
    margin-bottom: 8px;
  }

  .nav-menu { display: flex; flex-direction: column; gap: 2px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 6px;
    color: #a0a0a0;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s ease;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: rgba(255,255,255,0.05); color: #ffffff; }
  .nav-item.active { background: rgba(255,255,255,0.08); color: #ffffff; font-weight: 600; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; stroke-width: 2; }

  .sidebar-footer {
    margin-top: auto;
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-bottom: 8px;
  }

  .logout-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 12px;
    border-radius: 6px;
    color: #a0a0a0;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: none;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.15s ease;
    font-family: inherit;
  }

  .logout-btn:hover { background: rgba(220,38,38,0.1); color: #ef4444; }
  .logout-btn svg { width: 18px; height: 18px; }

  /* ===== CHAT SIDEBAR (In Flex Flow) ===== */
  .chat-sidebar {
    width: 280px;
    min-width: 280px;
    background: #fff;
    border-right: 1px solid #f0f0f0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin-left: 280px;
  }

  .chat-sidebar .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid #f0f0f0;
  }

  .chat-sidebar .sidebar-title {
    font-size: 18px;
    font-weight: 700;
    color: #111;
  }

  .chat-sidebar .sidebar-subtitle {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  .chat-list {
    flex: 1;
    overflow-y: auto;
    list-style: none;
  }

  .chat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid #f8f8f8;
    transition: background 0.15s;
  }

  .chat-item:hover { background: #f7f7f7; }
  .chat-item.active { background: #f4f0ff; }

  .chat-item-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    color: #555;
    flex-shrink: 0;
  }

  .chat-item-info { flex: 1; min-width: 0; }

  .chat-item-name {
    font-size: 13.5px;
    font-weight: 600;
    color: #222;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .chat-item-preview {
    font-size: 12px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .chat-item-time {
    font-size: 11px;
    color: #aaa;
    flex-shrink: 0;
  }

  .unread-badge {
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 10px;
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fafafa;
    height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
  }

  .menu-btn {
    display: none;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    background: #fff;
    color: #666;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .menu-btn:hover { border-color: #d0d0d0; color: #111; }
  .menu-btn svg { width: 20px; height: 20px; }

  .back-btn {
    display: none;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: 1px solid #e0e0e0;
    background: #fff;
    color: #666;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }
  .back-btn:hover { border-color: #d0d0d0; color: #111; }
  .back-btn svg { width: 20px; height: 20px; }

  .topbar-title { font-size: 15px; font-weight: 600; color: #111; }
  .topbar-subtitle { font-size: 12px; color: #888; }

  .content-main {
    flex: 1;
    padding: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    background: #fff;
    border-radius: 12px;
    border: 1px solid #f0f0f0;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .message.sent {
    align-self: flex-end;
    background: #7c3aed;
    color: white;
    border-bottom-right-radius: 4px;
  }

  .message.received {
    align-self: flex-start;
    background: #f5f5f5;
    color: #333;
    border-bottom-left-radius: 4px;
  }

  .message-time {
    font-size: 10px;
    opacity: 0.7;
    margin-top: 4px;
  }

  .message.sent .message-time { color: rgba(255,255,255,0.8); }
  .message.received .message-time { color: #888; }

  .chat-input-area {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .chat-input {
    flex: 1;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13.5px;
    color: #222;
    outline: none;
    font-family: inherit;
  }

  .chat-input:focus {
    border-color: #c4b5fd;
    box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
  }

  .chat-send-btn {
    background: #7c3aed;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }

  .chat-send-btn:hover { background: #6d28d9; }
  .chat-send-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .empty-state {
    text-align: center;
    color: #bbb;
    font-size: 13px;
    padding: 60px 20px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

  /* ══════════════════════════════════════
     RESPONSIVE: Mobile (≤768px)
     ══════════════════════════════════════ */
  @media (max-width: 768px) {
    /* Nav sidebar: right-aligned drawer */
    .nav-sidebar {
      left: auto;
      right: 0;
      transform: translateX(100%);
      width: 280px;
      border-right: none;
      border-left: 1px solid #1a1a2e;
      box-shadow: -16px 0 40px rgba(0,0,0,0.15);
    }
    .nav-sidebar.open { transform: translateX(0); }

    /* Chat sidebar: full width, no left margin */
    .chat-sidebar {
      margin-left: 0;
      width: 100%;
      min-width: 100%;
    }

    /* Main: hidden by default on mobile, shown when chat selected */
    .main {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
    }
    .main.active {
      display: flex;
    }

    /* Show menu button and back button */
    .menu-btn { display: flex; }
    .back-btn { display: flex; }

    /* Topbar adjustments */
    .topbar {
      padding: 12px 16px;
      gap: 10px;
    }
    .topbar-title { font-size: 14px; }
    .topbar-subtitle { font-size: 11px; }

    /* Content area */
    .content-main {
      padding: 12px;
    }

    /* Chat messages */
    .chat-messages {
      border-radius: 10px;
      padding: 12px;
    }
    .message {
      max-width: 85%;
      font-size: 14px;
    }

    /* Chat input */
    .chat-input {
      font-size: 16px; /* prevents iOS zoom */
      padding: 12px 14px;
    }
    .chat-send-btn {
      padding: 0 16px;
      font-size: 14px;
      min-width: 60px;
    }

    /* Chat list items: larger tap targets */
    .chat-item {
      padding: 16px 20px;
    }
    .chat-item-avatar {
      width: 44px;
      height: 44px;
      font-size: 15px;
    }
    .chat-item-name { font-size: 14px; }
    .chat-item-preview { font-size: 12.5px; }
  }

  /* ══════════════════════════════════════
     RESPONSIVE: Small phones (≤480px)
     ══════════════════════════════════════ */
  @media (max-width: 480px) {
    .topbar {
      padding: 10px 12px;
    }
    .topbar-title { font-size: 13px; }
    .topbar-subtitle { font-size: 10px; }

    .content-main {
      padding: 10px;
    }

    .chat-messages {
      padding: 10px;
      gap: 10px;
    }
    .message {
      padding: 9px 12px;
      font-size: 13.5px;
    }

    .chat-input-area {
      gap: 8px;
    }
    .chat-input {
      padding: 11px 12px;
      font-size: 16px;
    }
    .chat-send-btn {
      padding: 0 14px;
      font-size: 13px;
    }
  }
</style>
</head>

<script>
  // ===== UI LOGIC =====
  const navSidebar = document.getElementById('navSidebar');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  const menuBtn = document.getElementById('menuBtn');
  const backBtn = document.getElementById('backBtn');
  const mainChat = document.getElementById('mainChat');
  const chatSidebar = document.getElementById('chatSidebar');

  function toggleNavSidebar(force) {
    var open = typeof force === 'boolean' ? force : !navSidebar.classList.contains('open');
    navSidebar.classList.toggle('open', open);
    sidebarBackdrop.classList.toggle('visible', open);
    document.body.style.overflow = open ? 'hidden' : '';
  }

  menuBtn.addEventListener('click', function() { toggleNavSidebar(); });
  sidebarBackdrop.addEventListener('click', function() { toggleNavSidebar(false); });

  // Close nav sidebar when a link is tapped on mobile
  document.querySelectorAll('.nav-item').forEach(function(link) {
    link.addEventListener('click', function() {
      if (window.innerWidth <= 768) toggleNavSidebar(false);
    });
  });

  // Auto-close nav sidebar on resize past breakpoint
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768 && navSidebar.classList.contains('open')) {
      toggleNavSidebar(false);
    }
  });

  // Mobile: back button returns to chat list
  backBtn.addEventListener('click', function() {
    if (window.innerWidth <= 768) {
      mainChat.classList.remove('active');
      chatSidebar.style.display = 'flex';
    }
  });

  // Mobile: when chat selected, show main view
  function showMobileChatView() {
    if (window.innerWidth <= 768) {
      chatSidebar.style.display = 'none';
      mainChat.classList.add('active');
    }
  }
</script>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { collection, query, orderBy, onSnapshot, addDoc, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  let currentChatId = null;
  let unsubscribeMessages = null;
  let currentUser = null;

  const ADMIN_EMAIL = 'admin@synergy.com'; 

  const unsubscribeAuth = onAuthStateChanged(auth, (user) => {
    unsubscribeAuth();
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    
    if (user.email !== ADMIN_EMAIL) {
      alert('Admin access only. Your email: ' + user.email);
      window.location.href = 'dashboard.html';
      return;
    }
    
    loadChatList();
  });

  function loadChatList() {
    const chatList = document.getElementById('chatList');
    const q = query(collection(db, "chats"), orderBy("lastTimestamp", "desc"));

    onSnapshot(q, (snapshot) => {
      chatList.innerHTML = '';

      if (snapshot.empty) {
        chatList.innerHTML = '<li class="empty-state">No active chats</li>';
        return;
      }

      snapshot.forEach((docSnap) => {
        const chat = docSnap.data();
        const li = document.createElement('li');
        li.className = 'chat-item' + (docSnap.id === currentChatId ? ' active' : '');
        li.dataset.chatId = docSnap.id;

        const initial = chat.userEmail ? chat.userEmail[0].toUpperCase() : '?';
        const time = chat.lastTimestamp 
          ? chat.lastTimestamp.toDate().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'})
          : '';

        li.innerHTML = `
          <div class="chat-item-avatar">${initial}</div>
          <div class="chat-item-info">
            <div class="chat-item-name">
              ${escapeHtml(chat.userEmail || 'Unknown')}
              ${chat.unreadByAdmin > 0 ? `<span class="unread-badge">${chat.unreadByAdmin}</span>` : ''}
            </div>
            <div class="chat-item-preview">${escapeHtml(chat.lastMessage || 'No messages yet')}</div>
          </div>
          <div class="chat-item-time">${time}</div>
        `;

        li.addEventListener('click', () => selectChat(docSnap.id, chat));
        chatList.appendChild(li);
      });
    });
  }

  function selectChat(chatId, chatData) {
    currentChatId = chatId;

    // Update active state in sidebar
    document.querySelectorAll('.chat-item').forEach(item => {
      item.classList.toggle('active', item.dataset.chatId === chatId);
    });

    // Update header
    document.getElementById('chatTitle').textContent = chatData.userEmail || 'Unknown User';
    document.getElementById('chatSubtitle').textContent = 'User ID: ' + chatId.slice(0, 8);
    document.getElementById('inputArea').style.display = 'flex';

    // Mobile: switch to chat view
    if (typeof showMobileChatView === 'function') showMobileChatView();

    // Mark as read by admin
    updateDoc(doc(db, "chats", chatId), { unreadByAdmin: 0 });

    // Listen for messages
    const messagesQuery = query(
      collection(db, "chats", chatId, "messages"),
      orderBy("timestamp", "asc")
    );

    if (unsubscribeMessages) unsubscribeMessages();
    unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
      const container = document.getElementById('chatMessages');
      container.innerHTML = '';

      if (snapshot.empty) {
        container.innerHTML = '<div class="empty-state">No messages yet</div>';
        return;
      }

      snapshot.forEach((docSnap) => {
        const msg = docSnap.data();
        renderMessage(msg);
      });
      scrollToBottom();
    });
  }

  function renderMessage(msg) {
    const container = document.getElementById('chatMessages');
    const isAdmin = msg.senderType === 'admin';
    const div = document.createElement('div');
    div.className = `message ${isAdmin ? 'sent' : 'received'}`;

    const time = msg.timestamp 
      ? msg.timestamp.toDate().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'})
      : 'now';

    div.innerHTML = `
      ${escapeHtml(msg.text)}
      <div class="message-time">${time}</div>
    `;
    container.appendChild(div);
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function scrollToBottom() {
    const container = document.getElementById('chatMessages');
    container.scrollTop = container.scrollHeight;
  }

  async function sendReply() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !currentChatId) return;

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;

    try {
      await addDoc(collection(db, "chats", currentChatId, "messages"), {
        senderId: currentUser.uid,
        senderType: 'admin',
        text: text,
        timestamp: serverTimestamp()
      });

      await updateDoc(doc(db, "chats", currentChatId), {
        lastMessage: text,
        lastTimestamp: serverTimestamp(),
        unreadByUser: 1
      });

      input.value = '';
      sendBtn.disabled = false;
    } catch (err) {
      console.error(err);
      sendBtn.disabled = false;
      alert("Failed to send");
    }
  }

  document.getElementById('sendBtn').addEventListener('click', sendReply);
  document.getElementById('chatInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendReply();
  });
</script>
</body>
</html>
